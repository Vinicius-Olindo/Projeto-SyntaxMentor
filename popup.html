<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>SyntaxMentor - Dicionário</title>
    <link rel="stylesheet" href="css/popup.css">
</head>
<body>

    <!-- Cabeçalho Roxo -->
    <div class="header">
        <span class="icon">📖</span> Meu Dicionário
    </div>

    <div class="content">
        <!-- Campo de Adicionar -->
        <div class="input-container">
            <input type="text" id="word-input" placeholder="Digitar nova palavra...">
            <button id="add-btn" title="Adicionar ao dicionário">+</button>
        </div>

        <!-- Lista de Palavras -->
        <ul id="word-list">
            <!-- As palavras vão brotar aqui via Javascript -->
        </ul>

        <!-- 🆕 Botão Corrigir Tudo -->
        <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0;">
            <button id="btn-corrigir-tudo" style="
                width: 100%;
                background: linear-gradient(135deg, #6f42c1 0%, #8b5cf6 100%);
                color: white;
                border: none;
                padding: 12px;
                border-radius: 8px;
                font-weight: 700;
                font-size: 14px;
                cursor: pointer;
                transition: transform 0.2s, box-shadow 0.2s;
                box-shadow: 0 4px 10px rgba(111, 66, 193, 0.3);
                font-family: 'Segoe UI', system-ui, sans-serif;
            " onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 15px rgba(111, 66, 193, 0.4)'" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 10px rgba(111, 66, 193, 0.3)'">
                ✨ Corrigir Tudo na Página
            </button>
        </div>
    </div>

    <!-- Rodapé com o Link para as Opções -->
    <div class="popup-footer-hint">
        💡 Dica: Você pode editar palavras nas <a href="#" id="link-opcoes">Configurações</a>.
    </div>

    <script src="js/popup.js"></script>
</body>
</html>
