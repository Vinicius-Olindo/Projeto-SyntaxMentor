<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Fundo com gradiente moderno (Tons de roxo) -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    
    <!-- Sombra para o checkmark -->
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Base arredondada do app -->
  <rect x="8" y="8" width="112" height="112" rx="26" fill="url(#bgGradient)" />

  <!-- Linhas abstratas de texto (Sintaxe) -->
  <rect x="32" y="42" width="40" height="8" rx="4" fill="#ddd6fe" opacity="0.5"/>
  <rect x="32" y="60" width="64" height="8" rx="4" fill="#ddd6fe" opacity="0.5"/>
  <rect x="32" y="78" width="28" height="8" rx="4" fill="#ddd6fe" opacity="0.5"/>

  <!-- Checkmark de Validação/Mentoria (Branco com leve sombra) -->
  <path d="M 52 74 L 68 90 L 104 44" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#drop-shadow)"/>
</svg>
